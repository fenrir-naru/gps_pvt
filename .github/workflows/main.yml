name: Ruby

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Due to https://github.com/actions/runner/issues/849, we have to use quotes for '3.0'
        ruby: [2.3, 2.4, 2.6, 2.7, '3.0', 3.1, 3.2, 3.3, 3.4, '4.0']
        exclude:
          - os: windows-latest
            ruby: 2.3
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: before_setup
      shell: bash
      run: |
        case ${{ matrix.os }} in
        ubuntu-latest)
          sudo apt-get update && sudo apt-get install -yq libfftw3-dev
          ;;
        windows-latest)
          vcpkg install fftw3 --triplet=x64-mingw-static
          # find $(cygpath -u "$VCPKG_INSTALLATION_ROOT")/packages -name "*fftw3*"
          echo "BUNDLE_BUILD__RUBY___FFTW3=\"--with-fftw3-dir=$(cygpath -m ${VCPKG_INSTALLATION_ROOT})/packages/fftw3_x64-mingw-static\"" >> $GITHUB_ENV
          echo "BUNDLE_BUILD__NUMO___FFTW=\"--with-fftw-dir=$(cygpath -m ${VCPKG_INSTALLATION_ROOT})/packages/fftw3_x64-mingw-static\"" >> $GITHUB_ENV
          ;;
        esac
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      id: ruby-inst
      env:
        BUNDLE_BUILD__NARRAY: --with-cflags=-std=c17
        BUNDLE_BUILD__RUBY___FFTW3: --with-dldflags=-l:narray.so ${{ env.BUNDLE_BUILD__RUBY___FFTW3 }}
        BUNDLE_BUILD__NUMO___NARRAY: --with-cflags=-std=c17
        BUNDLE_BUILD__NUMO___FFTW: ${{ env.BUNDLE_BUILD__NUMO___FFTW }}
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Apply patch for github actions
      shell: bash
      run: |
        case ${{ matrix.os }} in
        ubuntu-latest)
          case ${{ matrix.ruby }} in
          '3.0')
            cat << '__PATCH_TEXT__' | sed -e 's/$/\r/g' | patch -ulN -p1 --binary
        diff --git a/spec/gps_pvt/almanac_spec.rb b/spec/gps_pvt/almanac_spec.rb
        index 78c88f5..3cc8a4d 100644
        --- a/spec/gps_pvt/almanac_spec.rb
        +++ b/spec/gps_pvt/almanac_spec.rb
        @@ -64,11 +64,11 @@
               Thread::new{rcv.send(*args_src2)}.join
             } rescue $stderr.puts "Timeout with #{eph_cache.size} item comparison remained"
           end
        -  it "can use SEM almanac" do
        +  xit "can use SEM almanac" do
             cmp([:parse_sem_almanac, src[:SEM]], [:parse_supl, src[:SUPL]])
             #cmp([:parse_sem_almanac, src[:SEM]], [:parse_rtcm3, src[:RTCM3]])
           end
        -  it "can use YUMA almanac" do
        +  xit "can use YUMA almanac" do
             cmp([:parse_yuma_almanac, src[:YUMA]], [:parse_supl, src[:SUPL]])
             #cmp([:parse_yuma_almanac, src[:YUMA]], [:parse_rtcm3, src[:RTCM3]])
           end
        __PATCH_TEXT__
            ;;
          esac
          ;;
        esac
    - name: Run the default task
      run: bundle exec rake
#      env:
#        NTRIP_CASTER: "rtk2go.com:2101"
#        NTRIP_AUTH: "test@example.com:none"
    - name: Upload artifact for error reproduction when failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v7
      with:
        name: gem-build-logs.${{ matrix.os }}_${{ matrix.ruby }}
        path: |
          ${{ github.workspace }}/vendor/bundle/ruby/**/gems/
          ${{ github.workspace }}/vendor/bundle/ruby/**/mkmf.log